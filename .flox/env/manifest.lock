{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "hook": {
      "on-activate": "  # Guard: Only run in the physical meta-repo directory\n  if [ \"$(pwd -P)\" != \"/home/rona/Repositories/RogerNavelsaker/nixpkgs\" ]; then\n    return\n  fi\n\n  # Symlink nixpkg-* repos, dropping prefix\n  for r in ../nixpkg-*; do\n    if [ -d \"$r\" ]; then\n      base=$(basename \"$r\")\n      name=${base#nixpkg-}\n      ln -snf \"$r\" \"$name\"\n    fi\n  done\n"
    },
    "options": {}
  },
  "packages": []
}
