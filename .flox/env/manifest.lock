      "common": "  alias workspace-bootstrap=\"$META_REPO_ROOT/scripts/bootstrap\"\n  alias workspace-status=\"$META_REPO_ROOT/scripts/status\"\n  alias gmi='pi-coding-agent --provider google --model gemini-3.1-pro-preview'\n  alias cc='pi-coding-agent --provider anthropic --model claude-opus-4-6'\n  alias cod='pi-coding-agent --provider openai-codex --model gpt-5.4'\n  alias mm='pi-coding-agent --provider llmstudio --model minimax-m2.5'\n  alias qc='pi-coding-agent --provider lmstudio --model qwen3.5-122b-a10b'\n"
