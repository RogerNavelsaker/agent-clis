schema-version = "1.10.0"

[install]

[vars]

[hook]
on-activate = '''
  # Guard: Only run in the physical meta-repo directory
  if [ "$(pwd -P)" != "/home/rona/Repositories/RogerNavelsaker/nixpkgs" ]; then
    return
  fi

  # Symlink nixpkg-* repos, dropping prefix
  for r in ../nixpkg-*; do
    if [ -d "$r" ]; then
      base=$(basename "$r")
      name=${base#nixpkg-}
      ln -snf "$r" "$name"
    fi
  done
'''
